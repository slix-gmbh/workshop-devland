apiVersion: apps/v1
kind: Deployment
metadata:
  name: rideshare-memory
  namespace: rideshare
  labels:
    app.kubernetes.io/component: region2
    app.kubernetes.io/instance: rideshare-demo
    app.kubernetes.io/name: rideshare-memory
    app: rideshare-memory
    profiling: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rideshare-memory
  template:
    metadata:
      annotations:
        prometheus.io.scrape: "true"
      labels:
        app.kubernetes.io/component: region2
        app.kubernetes.io/instance: rideshare-demo
        app.kubernetes.io/name: rideshare-memory
        app: rideshare-memory
        profiling: "true"
    spec:
      securityContext: {}
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: true
      containers:
      - name: rideshare-memory
        image: fra.ocir.io/frsjez6mlvwx/slixpublic/ride-share-auto:1.3.1
        imagePullPolicy: Always
        env:
        - name: ENABLE_MEMORY_TEST
          value: "true"
        - name: ENABLE_LOCK_TEST
          value: "false"
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: ip=$(POD_IP)
        ports:
        - name: http
          containerPort: 5000
        resources:
          requests:
            memory: "8Mi"
            cpu: "50m"
          #limits:
          #  memory: "1024Mi"
          #  cpu: "300m"
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      volumes:
      - emptyDir: {}
        name: tmp
