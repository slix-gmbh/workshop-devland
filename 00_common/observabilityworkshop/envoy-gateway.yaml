apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./00_common/envoy
  prune: true
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-config
  sourceRef:
    kind: GitRepository
    name: flux-system-observability
  dependsOn:
  - name: cert-manager