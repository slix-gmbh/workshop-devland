apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./01_alloy
  prune: true
  dependsOn:
    - name: prometheus
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-config
  sourceRef:
    kind: GitRepository
    name: flux-system-observability
  