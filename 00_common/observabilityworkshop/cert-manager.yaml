apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  dependsOn:
    - name: prometheus
      namespace: flux-system
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system-observability
    namespace: flux-system
  path: "./00_common/cert-manager"
  prune: true
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-config