apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rustfs-buckets
  namespace: flux-system
spec:
  interval: 10m
  path: ./00_common/rustfs/provisioning
  prune: true
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-config
  sourceRef:
    kind: GitRepository
    name: flux-system-observability
  dependsOn:
    - name: s3-backend
  wait: true
  timeout: 5m